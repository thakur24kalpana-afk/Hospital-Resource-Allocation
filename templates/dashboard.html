<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #74b9ff, #a4d4ff);
        }

        h1 {
            text-align: center;
            color: white;
            padding: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 300px 300px;
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0984e3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        canvas {
            max-height: 220px !important;
        }
    </style>
</head>

<body>

<h1>Hospital Resource Allocation</h1>

<div class="container">

    <!-- LEFT TOP -->
    <div class="card">
        <form method="POST">
            <input type="number" name="beds" placeholder="Total Beds" required>
            <input type="number" name="ventilators" placeholder="Ventilators" required>
            <button type="submit">Run Allocation</button>
        </form>

        {% if result %}
        <p>Critical: {{result.critical}}</p>
        <p>Serious: {{result.serious}}</p>
        <p>Mild: {{result.mild}}</p>
        <p><b>Score: {{result.score}}</b></p>
        {% endif %}
    </div>

    <!-- RIGHT TOP BAR -->
    <div class="card">
        <canvas id="barChart"></canvas>
    </div>

    <!-- LEFT BOTTOM PIE -->
    <div class="card">
        <canvas id="pieChart"></canvas>
    </div>

    <!-- RIGHT BOTTOM LINE -->
    <div class="card">
        <canvas id="lineChart"></canvas>
    </div>

</div>

<script>
{% if result %}

let data = [{{result.critical}}, {{result.serious}}, {{result.mild}}];

new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: ["Critical", "Serious", "Mild"],
        datasets: [{
            data: data,
            backgroundColor: ["#ff7675","#fdcb6e","#55efc4"]
        }]
    }
});

new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: ["Critical","Serious","Mild"],
        datasets: [{
            data: data,
            backgroundColor: ["#ff7675","#fdcb6e","#55efc4"]
        }]
    }
});

new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
        labels: ["Critical","Serious","Mild"],
        datasets: [{
            label: "Patients",
            data: data,
            borderColor: "#0984e3",
            fill: false
        }]
    }
});

{% endif %}
</script>

</body>
</html>
