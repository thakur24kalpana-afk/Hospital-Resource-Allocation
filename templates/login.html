<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#74b9ff,#0984e3);
    font-family:sans-serif;
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0984e3;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="box">
    <h2>Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button>Login</button>
    </form>
</div>

</body>
</html>
